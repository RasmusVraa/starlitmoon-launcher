name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v prefix (e.g. 1.3.2)"
        required: true

permissions:
  contents: write
  actions: read
  id-token: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ inputs.version }}".Trim().TrimStart('v')
          } else {
            $v = "${{ github.ref_name }}".TrimStart('v')
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "version=$v"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build portable + app dir
        shell: pwsh
        run: |
          .\gradlew.bat createReleaseDistributable packageReleaseDistribution --no-daemon
          $portable = Get-ChildItem "build\compose\binaries\main-release\exe\*.exe" | Select-Object -First 1
          if (-not $portable) { throw "portable EXE not found" }
          Copy-Item $portable.FullName "StarlitMoonLauncher-${{ steps.ver.outputs.version }}.exe" -Force
          $appDir = "build\compose\binaries\main-release\app\StarlitMoonLauncher"
          if (-not (Test-Path $appDir)) { throw "App dir missing" }
          $zip = "StarlitMoonLauncher-${{ steps.ver.outputs.version }}-windows.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path (Join-Path $appDir "*") -DestinationPath $zip -CompressionLevel Optimal
          Write-Host "ZIP: $zip"
      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /?
          if ($LASTEXITCODE -ne 0) { throw "ISCC missing" }

      - name: Build Setup installer
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          (Get-Content installer\starlitmoon.iss) `
            -replace '#define AppVersion ".*"','#define AppVersion "'+$v+'"' `
            -replace 'OutputDir=.*','OutputDir=..\dist\v'+$v `
            -replace 'OutputBaseFilename=.*','OutputBaseFilename=StarlitMoonLauncher-Setup-'+$v `
            | Set-Content installer\starlitmoon.iss -Encoding UTF8
          New-Item -ItemType Directory -Force -Path "dist\v$v" | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\starlitmoon.iss
          Copy-Item "dist\v$v\StarlitMoonLauncher-Setup-$v.exe" "StarlitMoonLauncher-Setup-$v.exe" -Force

      # SignPath (real CA) — only when secrets exist after OSS approval.
      - name: Upload unsigned Setup for SignPath
        id: upload-setup
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' && secrets.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-setup
          path: StarlitMoonLauncher-Setup-${{ steps.ver.outputs.version }}.exe
          retention-days: 1

      - name: Sign Setup with SignPath
        id: sign-setup
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' && secrets.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-setup.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-setup

      - name: Use signed Setup if present
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' && secrets.SIGNPATH_ORGANIZATION_ID != '' }}
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $signed = Get-ChildItem -Path signed-setup -Recurse -Filter *.exe | Select-Object -First 1
          if (-not $signed) { throw "SignPath returned no EXE" }
          Copy-Item $signed.FullName "StarlitMoonLauncher-Setup-$v.exe" -Force
          Write-Host "Using SignPath-signed Setup: $($signed.FullName)"

      - name: Upload unsigned portable for SignPath
        id: upload-portable
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' && secrets.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-portable
          path: StarlitMoonLauncher-${{ steps.ver.outputs.version }}.exe
          retention-days: 1

      - name: Sign portable with SignPath
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' && secrets.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-portable.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-portable

      - name: Use signed portable if present
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' && secrets.SIGNPATH_ORGANIZATION_ID != '' }}
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $signed = Get-ChildItem -Path signed-portable -Recurse -Filter *.exe | Select-Object -First 1
          if (-not $signed) { throw "SignPath returned no portable EXE" }
          Copy-Item $signed.FullName "StarlitMoonLauncher-$v.exe" -Force

      - name: Warn if SignPath secrets missing
        if: ${{ secrets.SIGNPATH_API_TOKEN == '' || secrets.SIGNPATH_ORGANIZATION_ID == '' }}
        shell: pwsh
        run: |
          Write-Warning "SIGNPATH secrets missing — publishing UNSIGNED build. Smart App Control will still block."

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: StarlitMoon Launcher v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            StarlitMoonLauncher-Setup-${{ steps.ver.outputs.version }}.exe
            StarlitMoonLauncher-${{ steps.ver.outputs.version }}.exe
            StarlitMoonLauncher-${{ steps.ver.outputs.version }}-windows.zip
          body: |
            ## Сборка
            - Windows Setup (первая установка)
            - ZIP для быстрого обновления из лаунчера
            - Portable EXE

            Free code signing provided by SignPath.io, certificate by SignPath Foundation (если секреты SignPath настроены).
