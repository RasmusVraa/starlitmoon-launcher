name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build EXE installer
        shell: pwsh
        run: .\gradlew.bat packageReleaseDistribution --no-daemon

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/compose/binaries/main-release/exe/*.exe
          generate_release_notes: true
