<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    #stage {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <div id="stage"><canvas id="skin"></canvas></div>
  <script src="skinview3d.bundle.js"></script>
  <script>
    let viewer = null;
    let ready = false;

    function ensureViewer() {
      if (viewer) return viewer;
      const canvas = document.getElementById("skin");
      const stage = document.getElementById("stage");
      const w = Math.max(160, stage.clientWidth || 280);
      const h = Math.max(200, stage.clientHeight || 320);
      const { SkinViewer, WalkingAnimation } = skinview3d;
      viewer = new SkinViewer({ canvas, width: w, height: h });
      viewer.background = 0x00000000;
      viewer.autoRotate = true;
      viewer.autoRotateSpeed = 0.6;
      viewer.animation = new WalkingAnimation();
      viewer.animation.speed = 0.7;
      if (viewer.controls) {
        viewer.controls.enablePan = false;
        viewer.controls.enableZoom = true;
      }
      // Face the camera by default (slight three-quarter)
      viewer.camera.position.set(18, 10, 42);
      viewer.camera.lookAt(0, 8, 0);
      ready = true;
      return viewer;
    }

    function resize() {
      if (!viewer) return;
      const stage = document.getElementById("stage");
      const w = Math.max(160, stage.clientWidth || 280);
      const h = Math.max(200, stage.clientHeight || 320);
      viewer.setSize(w, h);
      viewer.zoom = h / w > 1.2 ? 0.92 : 0.78;
    }

    window.addEventListener("resize", resize);
    if (typeof ResizeObserver !== "undefined") {
      new ResizeObserver(resize).observe(document.getElementById("stage"));
    }

    /**
     * @param {string|null} skinDataUrl
     * @param {string|null} capeDataUrl
     * @param {boolean} slim
     * @param {boolean} animate
     */
    window.setSkin = async function (skinDataUrl, capeDataUrl, slim, animate) {
      try {
        const v = ensureViewer();
        resize();
        if (animate === false) {
          v.autoRotate = false;
          v.animation = null;
          v.camera.position.set(22, 12, 48);
          v.camera.lookAt(0, 10, 0);
        } else {
          v.autoRotate = true;
          if (!v.animation) {
            v.animation = new skinview3d.WalkingAnimation();
            v.animation.speed = 0.7;
          }
        }
        if (skinDataUrl) {
          await v.loadSkin(skinDataUrl, { model: slim ? "slim" : "default" });
        }
        if (capeDataUrl) {
          await v.loadCape(capeDataUrl);
        } else {
          await v.loadCape(null);
        }
        return "ok";
      } catch (e) {
        console.error(e);
        return String(e);
      }
    };

    window.skinReady = function () { return ready || !!window.skinview3d; };
  </script>
</body>
</html>
